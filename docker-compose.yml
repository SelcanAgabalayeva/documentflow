version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: documentflow_postgres
    restart: always
    environment:
      POSTGRES_DB: documentflow
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: documentflow_mailpit
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7
    container_name: documentflow_redis
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4
    container_name: documentflow_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: